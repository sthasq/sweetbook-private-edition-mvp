name: Deploy Sweetbook Demo

on:
  push:
    branches:
      - codex/private-edition-mvp-progress
  workflow_dispatch:

concurrency:
  group: sweetbook-demo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 138.2.120.43
      DEPLOY_USER: opc
      DEPLOY_PATH: /home/opc/apps/sweetbook-demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate backend
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          export VITE_APP_BASE_PATH=/sweetbook-demo
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.SWEETBOOK_DEMO_DEPLOY_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare production env file
        run: |
          cat > /tmp/sweetbook-demo.env <<'EOF'
          ${{ secrets.SWEETBOOK_DEMO_ENV_FILE }}
          EOF

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude '.playwright-cli/' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/dist/' \
            --exclude 'backend/.gradle/' \
            --exclude 'backend/build/' \
            --exclude 'output/' \
            --exclude '*.log' \
            --exclude '*.pdf' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Upload production env file
        run: |
          scp /tmp/sweetbook-demo.env \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.production"

      - name: Deploy on server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            chmod +x deploy/*.sh frontend/docker-entrypoint.d/40-configure-app-base.sh
            ./deploy/deploy.sh .env.production
          "

      - name: Smoke test
        run: |
          curl -kfsS https://gscheon.com/sweetbook-demo/ >/dev/null
