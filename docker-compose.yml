name: playpick-mvp

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-playpick}
      MYSQL_USER: ${MYSQL_USERNAME:-playpick}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-playpick}
      MYSQL_DATABASE: playpick
    ports:
      - "${MYSQL_BIND_HOST:-0.0.0.0}:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_BIND_HOST:-0.0.0.0}:${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND_HOST:-0.0.0.0}:${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - ${USERPROFILE}/.ssh:/root/.ssh:ro
      - ./frontend/public/demo-assets:/app/demo-assets:ro
    environment:
      SPRING_PROFILES_ACTIVE: docker,session-redis
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/playpick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-playpick}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-playpick}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      APP_DEMO_ASSET_DIR: ${APP_DEMO_ASSET_DIR:-/app/demo-assets}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PUBLIC_ASSET_BASE_URL: ${PUBLIC_ASSET_BASE_URL:-}
      PUBLIC_ASSET_SCP_TARGET: ${PUBLIC_ASSET_SCP_TARGET:-}
      PUBLIC_ASSET_SSH_KEY_PATH: /root/.ssh/oci_a1_free
      SWEETBOOK_ENABLED: ${SWEETBOOK_ENABLED:-false}
      SWEETBOOK_API_KEY: ${SWEETBOOK_API_KEY:-}
      SWEETBOOK_BASE_URL: ${SWEETBOOK_BASE_URL:-https://api-sandbox.sweetbook.com/v1}
      SWEETBOOK_WEBHOOK_SECRET: ${SWEETBOOK_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/google/callback}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-3-flash-preview}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      TOSS_PAYMENTS_ENABLED: ${TOSS_PAYMENTS_ENABLED:-false}
      TOSS_PAYMENTS_CLIENT_KEY: ${TOSS_PAYMENTS_CLIENT_KEY:-}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY:-}
      TOSS_PAYMENTS_BASE_URL: ${TOSS_PAYMENTS_BASE_URL:-https://api.tosspayments.com}

  frontend:
    build:
      context: ./frontend
      args:
        APP_BASE_PATH: ${APP_BASE_PATH:-/}
    depends_on:
      - backend
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/}
    ports:
      - "${FRONTEND_BIND_HOST:-0.0.0.0}:${FRONTEND_HOST_PORT:-3000}:80"

volumes:
  mysql-data:
  redis-data:
