name: private-edition-mvp

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-privateedition}
      MYSQL_USER: ${MYSQL_USERNAME:-privateedition}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-privateedition}
      MYSQL_DATABASE: private_edition
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/private_edition?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-privateedition}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-privateedition}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      SWEETBOOK_ENABLED: ${SWEETBOOK_ENABLED:-true}
      SWEETBOOK_API_KEY: ${SWEETBOOK_API_KEY:-}
      SWEETBOOK_BASE_URL: ${SWEETBOOK_BASE_URL:-https://api-sandbox.sweetbook.com/v1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/google/callback}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql-data:
