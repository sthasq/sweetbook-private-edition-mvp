spring:
  main:
    web-application-type: servlet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/private_edition?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:privateedition}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  demo-image-base-url: ${DEMO_IMAGE_BASE_URL:https://picsum.photos}

sweetbook:
  base-url: ${SWEETBOOK_BASE_URL:https://api-sandbox.sweetbook.com/v1}
  api-key: ${SWEETBOOK_API_KEY:}
  enabled: ${SWEETBOOK_ENABLED:false}
  default-book-spec-uid: ${SWEETBOOK_BOOK_SPEC_UID:SQUAREBOOK_HC}
  default-template-category: ${SWEETBOOK_TEMPLATE_CATEGORY:album}
  default-cover-template-uid: ${SWEETBOOK_COVER_TEMPLATE_UID:}
  default-content-template-uid: ${SWEETBOOK_CONTENT_TEMPLATE_UID:}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/oauth/google/callback}
  api-key: ${YOUTUBE_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
