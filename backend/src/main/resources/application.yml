spring:
  main:
    web-application-type: servlet
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/playpick?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:playpick}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  demo-image-base-url: ${DEMO_IMAGE_BASE_URL:https://picsum.photos}
  studio-asset-dir: ${STUDIO_ASSET_DIR:${java.io.tmpdir}/playpick-studio-assets}
  demo-asset-dir: ${APP_DEMO_ASSET_DIR:../frontend/public/demo-assets}
  public-base-url: ${PUBLIC_BASE_URL:}
  public-asset-base-url: ${PUBLIC_ASSET_BASE_URL:}
  public-asset-scp-target: ${PUBLIC_ASSET_SCP_TARGET:}
  public-asset-ssh-key-path: ${PUBLIC_ASSET_SSH_KEY_PATH:}
  commission-rate: ${APP_COMMISSION_RATE:0.20}
  margin-rate: ${APP_MARGIN_RATE:0.35}

sweetbook:
  base-url: ${SWEETBOOK_BASE_URL:https://api-sandbox.sweetbook.com/v1}
  api-key: ${SWEETBOOK_API_KEY:}
  enabled: ${SWEETBOOK_ENABLED:false}
  default-book-spec-uid: ${SWEETBOOK_BOOK_SPEC_UID:SQUAREBOOK_HC}
  default-template-category: ${SWEETBOOK_TEMPLATE_CATEGORY:album}
  default-cover-template-uid: ${SWEETBOOK_COVER_TEMPLATE_UID:4MY2fokVjkeY}
  default-publish-template-uid: ${SWEETBOOK_PUBLISH_TEMPLATE_UID:75vMl9IeyPMI}
  default-content-template-uid: ${SWEETBOOK_CONTENT_TEMPLATE_UID:3FhSEhJ94c0T}
  default-content-text-template-uid: ${SWEETBOOK_CONTENT_TEXT_TEMPLATE_UID:vHA59XPPKqak}
  default-content-gallery-template-uid: ${SWEETBOOK_CONTENT_GALLERY_TEMPLATE_UID:y5Ih0Uo7tuQ3}
  default-divider-template-uid: ${SWEETBOOK_DIVIDER_TEMPLATE_UID:1N8i0MR6Ro1D}
  webhook-secret: ${SWEETBOOK_WEBHOOK_SECRET:}

openrouter:
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  api-key: ${OPENROUTER_API_KEY:}
  chat-model: ${OPENROUTER_CHAT_MODEL:google/gemini-3-flash-preview}

toss-payments:
  base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
  client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
  secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
  enabled: ${TOSS_PAYMENTS_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
